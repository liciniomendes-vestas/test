name: CI-CD

on: push

defaults:
  run:
    working-directory: src/Cli

jobs:
  # build:
  #   name: Build and Test
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v2
  #     - name: Installing SDK .NET
  #       uses: actions/setup-dotnet@v1
  #       with:
  #         dotnet-version: 5.0.x
  #     - name: Restore
  #       run: dotnet restore
  #     - name: Build
  #       run: dotnet build --no-restore -c Release
  #     - name: Tests
  #       run: dotnet test --no-build --verbosity n
  release:
    name: Publish and Create Release
    if: startsWith(github.ref, 'refs/tags/')
    # needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            rid: win-x64
            archive: win-x64
          - os: ubuntu-latest
            rid: linux-x64
            archive: linux-x64
    steps:
      - name: Github Context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Checkout
        uses: actions/checkout@v2
      - name: Installing SDK .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 5.0.x
      - name: Publish
        run: dotnet publish -c Release --self-contained --nologo -p:PublishTrimmed=true --output publish -r ${{ matrix.rid }}
      - name: Pack artifacts
        uses: papeloto/action-zip@v1
        with:
          dest: ${{ matrix.archive }}.zip
          files: publish/
        env:
          ZIP_CONTEXT: ${{ toJSON(github) }}
      - name: Dump Zip Context
        run: echo "$ZIP_CONTEXT"      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.archive }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}