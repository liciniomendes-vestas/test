  release:
    name: Publish and Create Release
    # if: startsWith(github.ref, 'refs/tags/')
    # needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            rid: win-x64
            archive: 
              type: zip
              name: windows.zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: 
              type: tar
              name: linux.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Installing SDK .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 5.0.x
      - name: Publish
        run: dotnet publish src/Cli -c Release --self-contained --nologo -p:PublishTrimmed=true --output publish -r ${{ matrix.rid }}
      - name: Create packed folder
        uses: thedoctor0/zip-release@master
        with:
          filename: ${{ matrix.archive.name }}
          directory: publish/
          type: ${{ matrix.archive.type }}
